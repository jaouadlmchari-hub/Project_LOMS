name: CI/CD LOMS Optimisé

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]

# Annule les runs obsolètes si tu push plusieurs fois de suite
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # 1. JOB DE BUILD : On compile et on partage l'exécutable
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true # CACHE ACTIVÉ : Accélère l'installation de NuGet (45s -> 5s)

      - name: Restore dependencies
        run: dotnet restore Project_LOMS.sln

      - name: Build
        run: dotnet build Project_LOMS.sln --configuration Release --no-restore

      # PARTAGE DU BUILD via Artifact pour éviter de recompiler dans le job de test
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ./**/bin/Release/net8.0/
          retention-days: 1

  # 2. JOB DE TEST : S'exécute en parallèle ou après le build
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true

      # On récupère le build déjà fait
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Run xUnit Tests
        run: dotnet test Project_LOMS.sln --configuration Release --no-build --verbosity normal