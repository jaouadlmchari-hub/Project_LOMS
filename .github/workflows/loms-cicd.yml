name: LOMS CI/CD Ultra-Optimized

on:
  push:
    branches: [ main ]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read


jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [LOMS_Employee, LOMS_Auth, LOMS_Applications, LOMS_Leave, LOMS_Salary]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore, Build & Test
        # On ajoute "Project_LOMS/" devant le nom du service
        run: |
          SLN_FILE=$(find ./Project_LOMS/${{ matrix.service }} -name "*.sln" | head -n 1)
          echo "Found Solution: $SLN_FILE"
          dotnet restore "$SLN_FILE"
          dotnet build "$SLN_FILE" --configuration Release --no-restore
          dotnet test "$SLN_FILE" --configuration Release --no-build

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [LOMS_Employee, LOMS_Auth, LOMS_Applications, LOMS_Leave, LOMS_Salary]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./Project_LOMS/ # Le contexte doit être le dossier parent
          # Chemin vers le Dockerfile spécifique
          file: ./Project_LOMS/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/loms-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max