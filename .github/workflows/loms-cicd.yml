name: LOMS CI/CD Ultra-Optimized

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Configuration du service SQL Server pour les tests d'intégration
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "JJ.1213famass"
        ports:
          - 1433:1433
        # On attend que SQL Server soit réellement prêt à répondre
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'JJ.1213famass' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        service: [LOMS_Employee, LOMS_Auth, LOMS_Applications, LOMS_Leave, LOMS_Salary, LOMS_Web]

    steps:
      - uses: actions/checkout@v4

      - name: Restore, Build & Test
        env:
          # Injection de la chaîne de connexion pour que les tests trouvent la DB
          ConnectionStrings__DefaultConnection: "Server=localhost;Database=LOMS_EmployeeDB;User Id=sa;Password=JJ.1213famass;TrustServerCertificate=True"
        run: |
          # 1. Localisation du projet API
          PROJ_FILE=$(find ./${{ matrix.service }} -name "*_API.csproj" | head -n 1)
          echo "Building: $PROJ_FILE"
          
          dotnet restore "$PROJ_FILE"
          dotnet build "$PROJ_FILE" -c Release --no-restore
          
          # 2. Localisation et exécution des tests (Uniquement Unit Tests)
          TEST_PROJECT=$(find . -name "${{ matrix.service }}*Tests.csproj" | head -n 1)
          if [ -n "$TEST_PROJECT" ]; then
            echo "Testing: $TEST_PROJECT (Excluding Integration Tests)"
            # On lance uniquement les tests unitaires pour valider la logique métier
            dotnet test "$TEST_PROJECT" -c Release --filter "FullyQualifiedName!~Integration"
          else
            echo "Aucun projet de test trouvé pour ${{ matrix.service }}"
          fi

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [LOMS_Employee, LOMS_Auth, LOMS_Applications, LOMS_Leave, LOMS_Salary, LOMS_Web]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Lowercase Service Name
        id: service_name
        run: echo "lower=$(echo ${{ matrix.service }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          # On change le contexte pour la RACINE du projet (.)
          context: . 
          # Mais on pointe bien vers le Dockerfile du service spécifique
          file: ./${{ matrix.service }}/Dockerfile 
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service_name.outputs.lower }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max