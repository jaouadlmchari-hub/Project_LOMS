name: LOMS CI/CD Ultra-Optimized

on:
  push:
    branches: [ main ]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- JOB 1 : BUILD  ---
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore & Build
        run: |
          dotnet restore Project_LOMS.sln
          dotnet build Project_LOMS.sln --configuration Release --no-restore

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: loms-binaries
          path: |
            **/bin/Release/net8.0/
            **/publish/
          retention-days: 1

  # --- JOB 2 : TESTS (Parallélisés par service) ---
  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [Employee, Auth, Applications, Leave, Salary]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download Binaries
        uses: actions/download-artifact@v4
        with:
          name: loms-binaries

      - name: Run Tests ${{ matrix.service }}
        run: dotnet test LOMS_${{ matrix.service }}.Tests/LOMS_${{ matrix.service }}.Tests.csproj --configuration Release --no-build

  # --- JOB 3 : DEPLOY (Build Docker & Push Parallélisés + Cache GHA) ---
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [Employee, Auth, Applications, Leave, Salary]
    steps:
      - uses: actions/checkout@v4

      - name: Download Binaries
        uses: actions/download-artifact@v4
        with:
          name: loms-binaries

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: LOMS_${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/loms-${{ matrix.service }}:latest
          # --- LES CACHES SONT BIEN ICI (Appliqués à chaque itération de la matrix) ---
          cache-from: type=gha
          cache-to: type=gha,mode=max