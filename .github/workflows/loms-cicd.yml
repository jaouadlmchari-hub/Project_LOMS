name: LOMS CI/CD Ultra-Optimized

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        
        service: [LOMS_Employee, LOMS_Auth, LOMS_Applications, LOMS_Leave, LOMS_Salary]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore, Build & Test
        run: |
          PROJ_FILE=$(find ./${{ matrix.service }} -name "*_API.csproj" | head -n 1)
          
          if [ -z "$PROJ_FILE" ]; then
            echo "ERREUR : Aucun projet API trouvé dans ${{ matrix.service }}"
            exit 1
          fi
          
          echo "Processing Project: $PROJ_FILE"
          dotnet restore "$PROJ_FILE"
          dotnet build "$PROJ_FILE" --configuration Release --no-restore
          
          # On cherche le dossier de test (ex: ./LOMS_Employee.Tests ou ./LOMS_Employee_Tests)
          TEST_FILE=$(find . -name "${{ matrix.service }}*Tests.csproj" | head -n 1 || echo "")
          if [ -n "$TEST_FILE" ]; then
            echo "Running tests: $TEST_FILE"
            dotnet test "$TEST_FILE" --configuration Release --no-build
          else
            echo "Note: Aucun projet de test trouvé pour ${{ matrix.service }}, on continue."
          fi

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [LOMS_Employee, LOMS_Auth, LOMS_Applications, LOMS_Leave, LOMS_Salary]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max