name: LOMS CI/CD Ultra-Optimized

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [LOMS_Employee, LOMS_Auth, LOMS_Applications, LOMS_Leave, LOMS_Salary]

    steps:
      - uses: actions/checkout@v4



      - name: Restore, Build & Test
        run: |
          # 1. Trouver le projet API
          PROJ_FILE=$(find ./${{ matrix.service }} -name "*_API.csproj" | head -n 1)
          echo "Building: $PROJ_FILE"
          
          # On fait tout d'un coup pour éviter les conflits de dossiers
          dotnet restore "$PROJ_FILE"
          dotnet build "$PROJ_FILE" -c Release --no-restore
          
          # 2. Trouver et lancer les tests
          TEST_PROJECT=$(find . -name "${{ matrix.service }}*Tests.csproj" | head -n 1)
          if [ -n "$TEST_PROJECT" ]; then
            echo "Testing: $TEST_PROJECT"
            # On retire --no-build pour être sûr que VSTest trouve tout
            dotnet test "$TEST_PROJECT" -c Release
          fi

  deploy:
    needs: build-and-test
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [LOMS_Employee, LOMS_Auth, LOMS_Applications, LOMS_Leave, LOMS_Salary]
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest