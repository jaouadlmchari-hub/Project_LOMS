name: LOMS CI/CD Ultra-Optimized

on:
  push:
    branches: [ main ]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # -------------------------
  # CI : BUILD + TEST GLOBAL
  # -------------------------
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - LOMS_Employee
          - LOMS_Auth
          - LOMS_Applications
          - LOMS_Leave
          - LOMS_Salary

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore ${{ matrix.service }}/${{ matrix.service }}.sln

      - name: Build
        run: dotnet build ${{ matrix.service }}/${{ matrix.service }}.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test ${{ matrix.service }}/${{ matrix.service }}.sln --configuration Release --no-build


  # -------------------------
  # CD : DOCKER DEPLOY
  # -------------------------
  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - LOMS_Employee
          - LOMS_Auth
          - LOMS_Applications
          - LOMS_Leave
          - LOMS_Salary

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/loms-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max