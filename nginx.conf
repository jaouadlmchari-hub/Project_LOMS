server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;

    # --- 1. ROUTAGE DES APIS (Vers les conteneurs Backend) ---
    
    # Employee Service
    location ~* ^/api/(employees|departments|jobs|countries) {
        proxy_pass http://employee-container:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth Service
    location ~* ^/api/auth {
        proxy_pass http://auth-container:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Applications Service
    location ~* ^/api/applications {
        proxy_pass http://applications-container:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Leave Service
    location ~* ^/api/leave {
        proxy_pass http://leave-container:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Salary Service
    location ~* ^/api/salaries {
        proxy_pass http://salaries-container:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 2. SERVICE DU SITE WEB (Vers ton Localhost React Dev Server) ---
    location / {
        # REMPLACEMENT ICI : Utilisation de ton IP réelle Windows/WSL2
        proxy_pass http://192.168.56.1:5174;         
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Important pour WebSocket (utilisé par Vite pour le Hot Module Replacement)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeout plus long pour le dev
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}